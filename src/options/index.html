<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Notion Cal &mdash; Apple Reminders Settings</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        padding: 24px;
        max-width: 480px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 16px;
      }
      .list-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
      }
      .list-row:last-child {
        border-bottom: none;
      }
      .list-name {
        flex: 1;
        font-size: 14px;
      }
      input[type="color"] {
        width: 32px;
        height: 32px;
        border: 1px solid #ccc;
        border-radius: 6px;
        cursor: pointer;
        padding: 2px;
      }
      .status {
        font-size: 12px;
        color: #666;
        margin-top: 12px;
        min-height: 18px;
      }
      .loading {
        color: #999;
        font-size: 14px;
        padding: 16px 0;
      }
    </style>
  </head>
  <body>
    <h1>List Colors</h1>
    <div id="lists"><p class="loading">Loading lists...</p></div>
    <p id="status" class="status"></p>
    <script src="options.js" type="module"></script>
  </body>
</html>
